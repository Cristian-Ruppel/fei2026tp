services:
  db:
    image: postgres:16
    container_name: fei2026tp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  django:
    build:
      context: .
      dockerfile: config/django-image/Dockerfile
    image: fei2026tp:0.1
    container_name: fei2026tp-django
    working_dir: /app
    command: /bin/bash /entrypoint.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db